name: ci

on:
  push:
  pull_request:

jobs:
  moonbit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MoonBit
        uses: moonbitlang/setup-moonbit@v1

      - name: Check
        run: moon check

      - name: Test
        run: moon test

      - name: Format
        run: moon fmt

